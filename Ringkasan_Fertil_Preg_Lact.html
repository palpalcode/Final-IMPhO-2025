<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endokrinologi & Reproduksi — Unit XIV Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #faf7ff;
    --surface:  #ffffff;
    --primary:  #b76db8;
    --p-dark:   #8b4a8c;
    --p-light:  #f3e5f5;
    --accent1:  #e8789a;
    --accent2:  #7c6fae;
    --accent3:  #5fa8d3;
    --correct:  #2d9d5a;
    --wrong:    #d64545;
    --text:     #2d2a3e;
    --muted:    #7a7685;
    --border:   #e8e0f0;
    --shadow:   0 12px 48px rgba(139, 74, 140, 0.12);
    --r:        24px;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 60px;
    overflow-x: hidden;
    position: relative;
  }

  /* ═══ ANIMATED MESH BACKGROUND ═══ */
  .bg-mesh {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.45;
    animation: floatBlob 20s infinite ease-in-out;
  }
  .blob-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(183,109,184,0.4) 0%, transparent 70%);
    top: -10%; left: -5%;
    animation-delay: 0s;
  }
  .blob-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(231,120,154,0.35) 0%, transparent 70%);
    bottom: -5%; right: -8%;
    animation-delay: -5s;
    animation-duration: 25s;
  }
  .blob-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(95,168,211,0.3) 0%, transparent 70%);
    top: 40%; left: 60%;
    animation-delay: -10s;
    animation-duration: 22s;
  }
  .blob-4 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(124,111,174,0.35) 0%, transparent 70%);
    top: 10%; right: 20%;
    animation-delay: -15s;
    animation-duration: 18s;
  }
  @keyframes floatBlob {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* Interactive particles on mouse move */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(183,109,184,0.25);
    border-radius: 50%;
    animation: particleFloat 15s infinite linear;
  }
  @keyframes particleFloat {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
  }

  /* ═══ HEADER ═══ */
  .header {
    width: 100%;
    padding: 48px 24px 56px;
    text-align: center;
    position: relative;
    z-index: 1;
    background: linear-gradient(135deg, rgba(183,109,184,0.08) 0%, rgba(231,120,154,0.06) 50%, rgba(95,168,211,0.08) 100%);
    border-bottom: 1px solid rgba(183,109,184,0.1);
  }
  .unit-tag {
    display: inline-block;
    background: rgba(183,109,184,0.12);
    color: var(--p-dark);
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 99px;
    margin-bottom: 18px;
    border: 1px solid rgba(183,109,184,0.2);
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--text);
    line-height: 1.2;
    font-weight: 600;
    position: relative;
    z-index: 1;
    letter-spacing: -0.5px;
  }
  .header h1 em {
    font-style: italic;
    color: var(--primary);
    font-weight: 400;
  }
  .header .sub {
    color: var(--muted);
    font-size: .95rem;
    margin-top: 12px;
    font-weight: 400;
    position: relative;
    z-index: 1;
    letter-spacing: 0.3px;
  }

  /* ═══ PROGRESS CARD ═══ */
  .progress-wrap {
    width: 100%; max-width: 800px;
    padding: 0 24px;
    margin-top: -24px;
    position: relative; z-index: 10;
  }
  .progress-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 18px 26px;
    display: flex; align-items: center; gap: 18px;
    border: 1px solid rgba(255,255,255,0.6);
  }
  .prog-info { flex: 1; }
  .prog-label {
    font-size: .7rem; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .prog-track {
    height: 8px; border-radius: 99px;
    background: #f0e8f7; overflow: hidden;
  }
  .prog-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent1), var(--primary), var(--accent2));
    transition: width .6s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 2px 8px rgba(183,109,184,0.3);
  }
  .q-counter { 
    font-weight: 700; font-size: .9rem; 
    color: var(--primary); white-space: nowrap; 
    font-family: 'Playfair Display', serif;
  }
  .score-pill {
    background: linear-gradient(135deg, var(--primary), var(--accent2));
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: .95rem;
    padding: 8px 20px;
    border-radius: 99px;
    box-shadow: 0 4px 16px rgba(139, 74, 140, 0.25);
    white-space: nowrap;
  }

  /* ═══ QUIZ CARD ═══ */
  .quiz-wrap {
    width: 100%; max-width: 800px;
    padding: 28px 24px 0;
    position: relative; z-index: 1;
  }
  .question-card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: var(--r);
    padding: 36px 34px 30px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    animation: cardIn .45s cubic-bezier(.4,0,.2,1);
    border: 1px solid rgba(255,255,255,0.7);
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(20px) scale(.98); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .card-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, var(--accent1), var(--primary), var(--accent2), var(--accent3));
  }
  .q-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--p-light);
    color: var(--p-dark);
    font-size: .8rem; font-weight: 700;
    padding: 6px 16px; border-radius: 99px;
    margin-bottom: 16px;
    border: 1.5px solid rgba(183,109,184,0.15);
    letter-spacing: 0.5px;
  }
  .q-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--primary);
    animation: pulse 2.5s infinite;
    box-shadow: 0 0 8px rgba(183,109,184,0.4);
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.6; transform:scale(.8); }
  }
  .q-text {
    font-size: 1.08rem; font-weight: 500;
    line-height: 1.7; color: var(--text);
    margin-bottom: 24px;
    font-family: 'Inter', sans-serif;
  }

  /* ═══ OPTIONS ═══ */
  .opts { display: flex; flex-direction: column; gap: 12px; }
  .opt {
    display: flex; align-items: flex-start; gap: 14px;
    background: rgba(250,247,252,0.8);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: .98rem; font-weight: 500;
    color: var(--text);
    text-align: left;
    transition: all .2s cubic-bezier(.4,0,.2,1);
    position: relative;
    overflow: hidden;
  }
  .opt::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 0;
    background: linear-gradient(180deg, var(--p-light), transparent);
    transition: width .3s;
    z-index: 0;
  }
  .opt:hover:not(:disabled)::before { width: 4px; }
  .opt:hover:not(:disabled) {
    border-color: var(--primary);
    background: rgba(243,229,245,0.5);
    transform: translateX(6px);
    box-shadow: 0 6px 24px rgba(183,109,184,0.12);
  }
  .opt:active:not(:disabled) { transform: translateX(3px) scale(.99); }
  .opt-ltr {
    min-width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #f0e4f7, #e8d5f0);
    color: var(--primary);
    font-family: 'Inter', sans-serif;
    font-size: .95rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
    transition: all .2s;
    position: relative; z-index: 1;
    border: 1px solid rgba(183,109,184,0.15);
  }
  .opt-txt { flex:1; line-height: 1.55; padding-top: 3px; position: relative; z-index: 1; }

  /* States */
  .opt.picked { border-color: var(--primary); background: var(--p-light); }
  .opt.picked .opt-ltr { background: var(--primary); color: white; border-color: var(--primary); }
  .opt.correct-ans {
    border-color: var(--correct); background: #f0fdf4;
    transform: translateX(0);
  }
  .opt.correct-ans .opt-ltr { background: var(--correct); color: white; border-color: var(--correct); }
  .opt.wrong-ans {
    border-color: var(--wrong); background: #fef2f2;
    animation: shake .45s;
  }
  .opt.wrong-ans .opt-ltr { background: var(--wrong); color: white; border-color: var(--wrong); }
  @keyframes shake {
    0%,100% { transform:translateX(0); }
    20% { transform:translateX(-7px); }
    40% { transform:translateX(7px); }
    60% { transform:translateX(-4px); }
    80% { transform:translateX(4px); }
  }
  .opt:disabled { cursor:default; }

  /* ═══ FEEDBACK ═══ */
  .feedback {
    display: none;
    margin-top: 20px;
    border-radius: 16px;
    padding: 18px 22px;
    animation: popIn .35s cubic-bezier(.4,0,.2,1);
    align-items: flex-start; gap: 14px;
    backdrop-filter: blur(10px);
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(.95) translateY(5px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }
  .feedback.show { display: flex; }
  .feedback.ok { 
    background: linear-gradient(135deg, rgba(240,253,244,0.9), rgba(220,252,231,0.8)); 
    border: 2px solid var(--correct); 
  }
  .feedback.no { 
    background: linear-gradient(135deg, rgba(254,242,242,0.9), rgba(254,226,226,0.8)); 
    border: 2px solid var(--wrong); 
  }
  .fb-icon { font-size: 1.8rem; flex-shrink:0; margin-top: -2px; }
  .fb-body { flex:1; }
  .fb-ttl { 
    font-size: .82rem; font-weight: 700; 
    text-transform: uppercase; letter-spacing:1.2px; 
    margin-bottom:6px; font-family: 'Inter', sans-serif;
  }
  .feedback.ok .fb-ttl { color: #166534; }
  .feedback.no .fb-ttl { color: #991b1b; }
  .fb-expl { 
    font-size: .9rem; font-weight: 500; 
    line-height:1.6; opacity:.9; 
  }
  .feedback.ok .fb-expl { color:#166534; }
  .feedback.no .fb-expl { color:#7f1d1d; }

  /* ═══ NEXT BTN ═══ */
  .next-btn {
    display: none;
    width:100%; margin-top:18px;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), var(--accent2));
    color:white; border:none; border-radius:14px;
    font-family: 'Playfair Display', serif;
    font-size:1.05rem; font-weight:600;
    cursor:pointer;
    box-shadow: 0 8px 28px rgba(139, 74, 140, 0.3);
    transition: all .25s;
    letter-spacing: 0.5px;
  }
  .next-btn:hover { 
    transform:translateY(-2px); 
    box-shadow:0 12px 36px rgba(139, 74, 140, 0.4); 
  }
  .next-btn:active { transform:translateY(0); }
  .next-btn.show { display:block; animation:popIn .35s; }

  /* ═══ FINISH SCREEN ═══ */
  #finish {
    display:none;
    width:100%; max-width:800px;
    padding: 28px 24px;
    animation: cardIn .5s cubic-bezier(.4,0,.2,1);
    position: relative; z-index: 1;
  }
  .finish-card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    padding: 48px 36px;
    text-align: center;
    position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.8);
  }
  .finish-card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:6px;
    background: linear-gradient(90deg, var(--accent1), var(--primary), var(--accent2), var(--accent3));
  }
  .trophy { 
    font-size:4.5rem; display:block; margin-bottom:18px; 
    animation: gentleBounce 2s infinite ease-in-out; 
    filter: drop-shadow(0 4px 12px rgba(183,109,184,0.3));
  }
  @keyframes gentleBounce {
    0%,100% { transform:translateY(0) rotate(0deg); }
    25% { transform:translateY(-8px) rotate(3deg); }
    75% { transform:translateY(-4px) rotate(-3deg); }
  }
  .fin-title { 
    font-family:'Playfair Display', serif; 
    font-size:2.2rem; font-weight:600; 
    color:var(--text); 
    letter-spacing: -0.5px;
  }
  .fin-score {
    font-family:'Playfair Display', serif;
    font-size:4.5rem; font-weight:700;
    background: linear-gradient(135deg, var(--primary), var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; line-height:1.1; margin:16px 0;
  }
  .fin-stats { 
    display:flex; gap:14px; justify-content:center; 
    flex-wrap:wrap; margin:22px 0; 
  }
  .stat { 
    padding:10px 22px; border-radius:99px; 
    font-weight:700; font-size:.9rem;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(0,0,0,0.05);
  }
  .stat.g { background:rgba(240,253,244,0.8); color:#166534; }
  .stat.r { background:rgba(254,242,242,0.8); color:#991b1b; }
  .stat.b { background:var(--p-light); color:var(--p-dark); }
  .fin-msg { 
    color:var(--muted); font-size:1rem; 
    font-weight:500; line-height:1.6; margin:16px 0 32px; 
    max-width: 500px; margin-left: auto; margin-right: auto;
  }
  .restart {
    padding:16px 48px;
    background: linear-gradient(135deg, var(--primary), var(--accent2));
    color:white; border:none; border-radius:14px;
    font-family:'Playfair Display', serif;
    font-size:1.15rem; font-weight:600;
    cursor:pointer;
    box-shadow:0 8px 28px rgba(139, 74, 140, 0.3);
    transition:all .25s;
    letter-spacing: 0.5px;
  }
  .restart:hover { 
    transform:translateY(-3px); 
    box-shadow:0 14px 40px rgba(139, 74, 140, 0.4); 
  }

  /* ═══ SCROLLBAR ═══ */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

  @media (max-width:560px) {
    .question-card { padding:24px 18px 22px; }
    .progress-card { padding:14px 16px; }
    .opt { font-size:.92rem; padding:13px 14px; }
    .header h1 { font-size: 1.8rem; }
    .fin-score { font-size: 3.5rem; }
  }
</style>
</head>
<body>

<!-- Animated Mesh Background -->
<div class="bg-mesh">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>
<div class="particles" id="particles"></div>

<<header class="header">
  <div class="unit-tag">Unit XIV · Guyton & Hall</div>
  <h1>Endokrinologi &amp; <em>Reproduksi</em></h1>
  <p class="sub">Kuis Fisiologi Endokrin &amp; Reproduksi</p>
</header>

<div class="progress-wrap">
  <div class="progress-card">
    <div class="prog-info">
      <div class="prog-label">Progres</div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="q-counter" id="q-counter">1 / 50</div>
    <div class="score-pill" id="score-pill">Score: 0</div>
  </div>
</div>

<div class="quiz-wrap" id="quiz-wrap">
  <div class="question-card" id="q-card">
    <div class="card-accent"></div>
    <div class="q-tag"><span class="q-dot"></span><span id="q-label">Soal #1</span></div>
    <div class="q-text" id="q-text">Memuat soal...</div>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback">
      <div class="fb-icon" id="fb-icon"></div>
      <div class="fb-body">
        <div class="fb-ttl" id="fb-ttl"></div>
        <div class="fb-expl" id="fb-expl"></div>
      </div>
    </div>
    <button class="next-btn" id="next-btn" onclick="next()">Soal Berikutnya →</button>
  </div>
</div>

<div id="finish">
  <div class="finish-card">
    <span class="trophy" id="trophy">🎓</span>
    <div class="fin-title" id="fin-title">Quiz Selesai!</div>
    <div class="fin-score" id="fin-score">0/50</div>
    <div class="fin-stats">
      <div class="stat g" id="s-correct">✅ 0 Benar</div>
      <div class="stat r" id="s-wrong">❌ 0 Salah</div>
      <div class="stat b" id="s-pct">🎯 0%</div>
    </div>
    <p class="fin-msg" id="fin-msg"></p>
    <button class="restart" onclick="restart()">Mulai Lagi (Urutan Baru)</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA SOAL YANG SUDAH DIBERSIHKAN
   ═══════════════════════════════════════ */
const ALL_Q = [
  {
    num: 1,
    question: "Which receptor controls nitric oxide (NO) release to cause vasodilation during penile erection?",
    options: { A: "Leptin receptor", B: "Angiotensin AT1 receptor", C: "Endothelin ETA receptor", D: "Muscarinic receptor" },
    answer: "D",
    explanation: "Parasympathetic postganglionic fibers release acetylcholine that activates muscarinic receptors on endothelium to produce NO and increase cGMP, causing vasodilation."
  },
  {
    num: 2,
    question: "Which statement about antidiuretic hormone (ADH) is true?",
    options: { A: "It is synthesized in the posterior pituitary gland", B: "It increases salt and water reabsorption in the collecting tubules and ducts", C: "It stimulates thirst", D: "It has opposite effects on urine and plasma osmolality" },
    answer: "D",
    explanation: "ADH increases water reabsorption (not salt), concentrating urine and diluting plasma — opposite effects on urine vs plasma osmolality. It is synthesized in hypothalamus, not posterior pituitary."
  },
  {
    num: 3,
    question: "After menopause, hormone replacement therapy with estrogen-like compounds is effective in preventing the progression of osteoporosis. What is the mechanism of their protective effect?",
    options: { A: "They stimulate the activity of osteoblasts", B: "They increase absorption of calcium from the gastrointestinal tract", C: "They stimulate calcium reabsorption by the renal tubules", D: "They stimulate parathyroid hormone (PTH) secretion by the parathyroid gland" },
    answer: "A",
    explanation: "Estrogen compounds stimulate osteoblast activity, tipping the balance toward bone building rather than degradation after menopause."
  },
  {
    num: 4,
    question: "A patient has nephrogenic diabetes insipidus. Of the following options, which outcome would be expected or which intervention would be suggested?",
    options: { A: "Expected outcome: decreased plasma sodium concentration", B: "Expected outcome: increased secretion of ADH from the supraoptic and paraventricular nuclei", C: "Expected outcome: high urine osmolality", D: "Suggested intervention: water restriction", E: "Suggested intervention: ADH antagonists (vaptans)" },
    answer: "B",
    explanation: "In nephrogenic diabetes insipidus, kidneys cannot respond to ADH, causing water loss and hypernatremia. Hypernatremia stimulates ADH secretion from magnocellular neurons."
  },
  {
    num: 5,
    question: "Within minutes after a normal delivery, flow through the foramen ovale decreases dramatically. What is the cause of this change?",
    options: { A: "Increased formation of prostaglandin E2 (PGE2) in the endocardium", B: "Increased rate of flow through the pulmonary artery", C: "Increased left atrial pressure", D: "Increased right atrial pressure", E: "Increased partial pressure of oxygen (Po2)" },
    answer: "C",
    explanation: "After birth, systemic arterial resistance increases, raising left atrial pressure. Meanwhile, pulmonary vascular resistance falls, reducing right atrial pressure. The pressure gradient change closes the foramen ovale."
  },
  {
    num: 6,
    question: "Which hormones antagonize the effect of NO and cause the penis to become flaccid after orgasm?",
    options: { A: "Endothelin and norepinephrine", B: "Estrogen and progesterone", C: "Luteinizing hormone (LH) and follicle-stimulating hormone (FSH)", D: "Progesterone and LH" },
    answer: "A",
    explanation: "Norepinephrine from nerve terminals and endothelin from endothelial cells cause vasoconstriction, antagonizing NO and promoting detumescence."
  },
  {
    num: 7,
    question: "Which lines most likely illustrate these relationships in a patient with type 2 diabetes? (Liver glucose production vs Insulin / Muscle glucose uptake vs Insulin)",

/* ── Ultra-random seed ── */
function seed() {
  const n = new Date();
  let s = (n.getMilliseconds()*1000003) ^ (n.getSeconds()*999983) ^
          (n.getMinutes()*99991) ^ (n.getHours()*9973) ^
          (n.getDate()*997) ^ (n.getMonth()*101) ^
          (Math.floor(Math.random()*999979));
  return s >>> 0;
}
function shuffle(arr, sd) {
  const a = [...arr]; let s = sd;
  function r(){ s^=s<<13; s^=s>>17; s^=s<<5; return (s>>>0)/4294967296; }
  for (let i=a.length-1;i>0;i--){ const j=Math.floor(r()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

/* ── State ── */
let questions=[], cur=0, score=0, wrong=0, answered=false;

function init() {
  questions = shuffle(ALL_Q, seed());
  cur=0; score=0; wrong=0; answered=false;
  document.getElementById('finish').style.display='none';
  document.getElementById('quiz-wrap').style.display='block';
  render();
  makeParticles();
}

function render() {
  answered=false;
  const q=questions[cur], tot=questions.length;

  document.getElementById('q-label').textContent='Soal #'+(cur+1);
  document.getElementById('q-text').textContent=q.question;
  document.getElementById('q-counter').textContent=(cur+1)+' / '+tot;
  document.getElementById('score-pill').textContent='Score: '+score;
  document.getElementById('prog-fill').style.width=(cur/tot*100)+'%';

  const opts=document.getElementById('opts');
  opts.innerHTML='';
  Object.entries(q.options).forEach(([ltr,txt])=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML='<div class="opt-ltr">'+ltr+'</div><div class="opt-txt">'+txt+'</div>';
    btn.onclick=()=>pick(ltr,btn);
    opts.appendChild(btn);
  });

  const fb=document.getElementById('feedback');
  fb.className='feedback';
  const nb=document.getElementById('next-btn');
  nb.className='next-btn';
  nb.textContent=cur===questions.length-1?'Lihat Hasil':'Soal Berikutnya →';

  const card=document.getElementById('q-card');
  card.style.animation='none'; void card.offsetWidth;
  card.style.animation='cardIn .45s cubic-bezier(.4,0,.2,1)';
}

function pick(ltr, btn) {
  if(answered) return;
  answered=true;
  const q=questions[cur];
  const allBtns=document.querySelectorAll('.opt');
  allBtns.forEach(b=>b.disabled=true);

  const ok=(ltr===q.answer);
  if(ok){ score++; btn.classList.add('correct-ans'); }
  else {
    wrong++;
    btn.classList.add('wrong-ans');
    allBtns.forEach(b=>{
      if(b.querySelector('.opt-ltr').textContent===q.answer)
        b.classList.add('correct-ans');
    });
  }

  const fb=document.getElementById('feedback');
  const icons_ok=['✅','🌟','💡','🎯'];
  const icons_no=['❌','📖','💭','🤔'];
  document.getElementById('fb-icon').textContent=ok
    ? icons_ok[Math.floor(Math.random()*icons_ok.length)]
    : icons_no[Math.floor(Math.random()*icons_no.length)];
  document.getElementById('fb-ttl').textContent=ok
    ? 'Jawaban Benar!'
    : 'Salah — Jawaban: '+q.answer;
  document.getElementById('fb-expl').textContent=q.explanation;
  fb.className='feedback show '+(ok?'ok':'no');

  document.getElementById('score-pill').textContent='Score: '+score;
  document.getElementById('next-btn').className='next-btn show';
}

function next() {
  cur++;
  if(cur>=questions.length) finish();
  else render();
}

function finish() {
  document.getElementById('quiz-wrap').style.display='none';
  document.getElementById('finish').style.display='block';
  const tot=questions.length, pct=Math.round(score/tot*100);
  document.getElementById('fin-score').textContent=score+'/'+tot;
  document.getElementById('s-correct').textContent='✅ '+score+' Benar';
  document.getElementById('s-wrong').textContent='❌ '+wrong+' Salah';
  document.getElementById('s-pct').textContent='🎯 '+pct+'%';
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('score-pill').textContent='Score: '+score;
  document.getElementById('q-counter').textContent=tot+'/'+tot;

  let em,ti,ms;
  if(pct>=90){em='🏆';ti='Luar Biasa!';ms='Nilai '+pct+'% — kamu benar-benar menguasai fisiologi endokrin & reproduksi!';}
  else if(pct>=75){em='🌟';ti='Hebat!';ms='Nilai '+pct+'% — pemahaman kamu sudah solid. Pertahankan!';}
  else if(pct>=60){em='💪';ti='Cukup Bagus!';ms='Nilai '+pct+'% — fondasi sudah ada. Ulangi materi yang masih ragu!';}
  else if(pct>=40){em='📖';ti='Terus Belajar!';ms='Nilai '+pct+'% — masih banyak ruang untuk berkembang. Buka lagi Guyton Unit XIV!';}
  else{em='🔄';ti='Jangan Menyerah!';ms='Nilai '+pct+'% — semua dokter pernah mulai dari nol. Pelajari lagi dan coba kembali!';}

  document.getElementById('trophy').textContent=em;
  document.getElementById('fin-title').textContent=ti;
  document.getElementById('fin-msg').textContent=ms;
}

function restart() { init(); window.scrollTo({top:0,behavior:'smooth'}); }

function makeParticles() {
  const c=document.getElementById('particles'); c.innerHTML='';
  for(let i=0;i<<20;i++){
    const d=document.createElement('div');
    d.className='particle';
    d.style.left=Math.random()*100+'vw';
    d.style.animationDuration=(12+Math.random()*20)+'s';
    d.style.animationDelay=(-Math.random()*25)+'s';
    d.style.width=d.style.height=(2+Math.random()*4)+'px';
    c.appendChild(d);
  }
}

init();
</script>
